[flake8]
max-line-length = 100
extend-ignore = E203, W503, E501
exclude =
    .git,
    __pycache__,
    */migrations/*,
    */static/*,
    */media/*,
    venv,
    env,
    .venv,
    build,
    dist
per-file-ignores =
    __init__.py:F401
max-complexity = 10

[isort]
profile = black
line_length = 100
skip_gitignore = true

[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
plugins = mypy_django_plugin.main

[mypy.plugins.django-stubs]
django_settings_module = censoProject.settings

[coverage:run]
source = censoapp
omit =
    */migrations/*
    */tests/*
    */__pycache__/*

