{% extends 'layouts/base.html' %}
{% load static %}
{% block title %}Dashboard{% endblock %}

{% block content %}
    <div class="container-fluid py-4">
        <div class="row">
            <div class="col-12">
                <div class="card mb-4">
                    <div class="card-header p-0 mx-3 mt-3 position-relative z-index-1">
                        <a href="javascript:;" class="d-block">
                            <img src="./assets/img/kit/pro/anastasia.jpg" class="img-fluid border-radius-lg">
                        </a>
                    </div>

                    <div class="card-body pt-2">
                        <span class="text-gradient text-primary text-uppercase text-xs font-weight-bold my-2">House</span>
                        <a href="javascript:;" class="card-title h5 d-block text-darker">
                            Shared Coworking
                        </a>
                        <div class="card bg-dark mb-3">
                            <div class="card-body p-3">
                                <div class="chart">
                                    <canvas id="line-chart" class="chart-canvas" height="300px"></canvas>
                                </div>
                            </div>
                        </div>
                        <div class="author align-items-center">
                            <img src="./assets/img/kit/pro/team-2.jpg" alt="..." class="avatar shadow">
                            <div class="name ps-3">
                                <span>Mathew Glock</span>
                                <div class="stats">
                                    <small>Posted on 28 February</small>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock content %}
{% block javascripts %}
    <script src="{% static 'assets/js/plugins/chartjs.min.js' %}"></script>
{% endblock javascripts %}
