{% load static %}
<!DOCTYPE html>
<html lang='es' class='h-full bg-gray-50'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>{% block title %}CensoWeb{% endblock %} | Sistema de Censo</title>
    <link href='{% static 'css/output.css' %}' rel='stylesheet'>
    <link rel='preconnect' href='https://fonts.googleapis.com'>
    <link href='https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap' rel='stylesheet'>
    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css'>
    <script defer src='https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js'></script>
    <script src='https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js'></script>
    <script src='https://cdn.jsdelivr.net/npm/sweetalert2@11'></script>
    {% block extra_head %}{% endblock %}
    <style>[x-cloak] { display: none !important; }</style>
</head>
<body class='h-full font-sans antialiased' x-data='{ sidebarOpen: false }'>
    <div class='flex h-full'>
        <div class='fixed inset-y-0 left-0 z-50 w-64 bg-white shadow-xl lg:static'>
            <div class='flex items-center justify-between h-16 px-6 bg-gradient-to-r from-primary-600 to-primary-700'>
                <div class='flex items-center'>
                    <i class='fas fa-users text-white text-2xl mr-3'></i>
                    <span class='text-xl font-bold text-white'>CensoWeb</span>
                </div>
            </div>
            <nav class='px-4 py-6 space-y-2'>
                <a href='/' class='flex items-center px-4 py-3 text-gray-700 hover:bg-primary-50 hover:text-primary-700 rounded-lg'>
                    <i class='fas fa-home w-5'></i><span class='ml-3'>Dashboard</span>
                </a>
            </nav>
        </div>
        <div class='flex-1 flex flex-col'>
            <header class='bg-white shadow-sm h-16'>
                <div class='flex items-center justify-between h-full px-8'>
                    <h1 class='text-xl font-semibold'>{% block page_title %}Dashboard{% endblock %}</h1>
                </div>
            </header>
            <main class='flex-1 overflow-y-auto bg-gray-50 p-8'>
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
    {% block extra_js %}{% endblock %}
</body>
</html>
