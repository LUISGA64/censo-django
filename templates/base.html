{% load static %}
{% load socialaccount %} 
{% load i18n %}
<!doctype html>
<html lang="en" class="h-100" data-bs-theme="auto">
<head>
    <script src="{% static 'home/js/color-modes.js' %}"></script>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="">
    <meta name="author" content="Mark Otto, Jacob Thornton, and Bootstrap contributors">
    <meta name="generator" content="Hugo 0.118.2">
    <title>Censo Web | {% block title %}{% endblock %}</title>

    <link rel="stylesheet" href="{% static 'home/css/css@3.css' %}">

    
    <link href="{% static 'home/css/bootstrap.min.css' %}" rel="stylesheet">

    <!-- Favicons -->
    <link rel="apple-touch-icon" href="{% static 'home/img/apple-touch-icon.png' %}" sizes="180x180">
    <link rel="icon" href="{% static 'home/img/favicon-32x32.png' %}" sizes="32x32" type="image/png">
    <link rel="icon" href="{% static 'home/img/favicon-16x16.png' %}" sizes="16x16" type="image/png">
    <link rel="manifest" href="{% static 'home/img/manifest.json' %}">
    <link rel="mask-icon" href="{% static 'home/img/safari-pinned-tab.svg' %}" color="#712cf9">
    <link rel="icon" href="{% static 'home/img/favicon.ico' %}">
    <meta name="theme-color" content="#712cf9">

    <!-- Custom styles for this template -->
    <link href="{% static 'home/css/cover.css' %}" rel="stylesheet">
</head>
<body class="d-flex h-100 text-center text-bg-dark">
<div class="cover-container d-flex w-100 h-100 p-3 mx-auto flex-column">
    <header class="mb-auto">
        <div>
            <h3 class="float-md-start mb-0">Censo Web</h3>
            <nav class="nav nav-masthead justify-content-center float-md-end">
                {% if user.is_authenticated %}
                    <a class="nav-link active" aria-current="page" href="">Perfil</a>
                    <a class="nav-link active" aria-current="page" href="{% url 'account_logout' %}">Logout</a>
                {% else %}
                    <a class="nav-link active" aria-current="page" href="{% url 'account_login' %}">Login</a><br>
                    <a class="nav-link active" aria-current="page" href="{% url 'account_signup' %}">Register</a>
                {% endif %}
            </nav>
        </div>
    </header>

    <main class="px-3">
        {% block content %}
        	
        {% endblock %}
    </main>

    <footer class="mt-auto text-white-50">
        <p>Cover template for <a href="https://getbootstrap.com/" class="text-white">Bootstrap</a>, by <a
                href="https://twitter.com/mdo" class="text-white">@mdo</a>.</p>
    </footer>
</div>
<script src="{% static 'home/js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
