<!-- Componente de Búsqueda Avanzada con Alpine.js -->
<div x-data="{
    query: '',
    filters: {
        organization: '',
        zone: '',
        dateFrom: '',
        dateTo: ''
    },
    showAdvanced: false,
    results: [],
    isSearching: false
}" class="w-full">

    <!-- Barra de búsqueda principal -->
    <div class="relative">
        <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <i class="fas fa-search text-gray-400"></i>
            </div>
            <input type="text"
                   x-model="query"
                   @input.debounce.500ms="search()"
                   placeholder="Buscar fichas, personas, documentos..."
                   class="block w-full pl-12 pr-32 py-3 border border-gray-300 rounded-lg leading-5 bg-white placeholder-gray-500 focus:outline-none focus:placeholder-gray-400 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 sm:text-sm transition-all duration-200">

            <!-- Botón búsqueda avanzada -->
            <div class="absolute inset-y-0 right-0 flex items-center pr-2">
                <button @click="showAdvanced = !showAdvanced"
                        type="button"
                        class="inline-flex items-center px-4 py-2 text-sm font-medium text-gray-700 bg-gray-50 hover:bg-gray-100 rounded-md transition-colors duration-200">
                    <i class="fas fa-sliders-h mr-2"></i>
                    Avanzada
                </button>
            </div>
        </div>

        <!-- Indicador de búsqueda -->
        <div x-show="isSearching"
             class="absolute right-36 top-1/2 transform -translate-y-1/2">
            <div class="spinner"></div>
        </div>
    </div>

    <!-- Panel de búsqueda avanzada -->
    <div x-show="showAdvanced"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 transform -translate-y-2"
         x-transition:enter-end="opacity-100 transform translate-y-0"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100 transform translate-y-0"
         x-transition:leave-end="opacity-0 transform -translate-y-2"
         class="mt-4 p-6 bg-white rounded-lg shadow-lg border border-gray-200"
         style="display: none;">

        <h3 class="text-lg font-semibold text-gray-900 mb-4 flex items-center gap-2">
            <i class="fas fa-filter text-primary-600"></i>
            Filtros Avanzados
        </h3>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
            <!-- Filtro por organización -->
            <div>
                <label class="form-label">
                    <i class="fas fa-building text-gray-400 mr-1"></i>
                    Resguardo
                </label>
                <select x-model="filters.organization" class="form-select">
                    <option value="">Todos</option>
                    {% for org in organizations %}
                    <option value="{{ org.id }}">{{ org.name_organizations }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Filtro por zona -->
            <div>
                <label class="form-label">
                    <i class="fas fa-map-marker-alt text-gray-400 mr-1"></i>
                    Zona
                </label>
                <select x-model="filters.zone" class="form-select">
                    <option value="">Todas</option>
                    <option value="Rural">Rural</option>
                    <option value="Urbana">Urbana</option>
                </select>
            </div>

            <!-- Filtro por fecha desde -->
            <div>
                <label class="form-label">
                    <i class="fas fa-calendar text-gray-400 mr-1"></i>
                    Desde
                </label>
                <input type="date"
                       x-model="filters.dateFrom"
                       class="form-input">
            </div>

            <!-- Filtro por fecha hasta -->
            <div>
                <label class="form-label">
                    <i class="fas fa-calendar text-gray-400 mr-1"></i>
                    Hasta
                </label>
                <input type="date"
                       x-model="filters.dateTo"
                       class="form-input">
            </div>
        </div>

        <!-- Botones de acción -->
        <div class="flex items-center justify-end gap-3 mt-6 pt-4 border-t border-gray-200">
            <button @click="resetFilters()"
                    type="button"
                    class="inline-flex items-center px-4 py-2 text-gray-700 hover:text-gray-900 font-medium text-sm">
                <i class="fas fa-undo mr-2"></i>
                Limpiar filtros
            </button>
            <button @click="search()"
                    type="button"
                    class="btn-primary">
                <i class="fas fa-search mr-2"></i>
                Buscar
            </button>
        </div>
    </div>

    <!-- Resultados de búsqueda -->
    <div x-show="results.length > 0"
         x-transition
         class="mt-4 space-y-2">
        <template x-for="result in results" :key="result.id">
            <div class="card p-4 animate-fadeIn cursor-pointer hover:shadow-lg transition-shadow">
                <div class="flex items-center justify-between">
                    <div class="flex-1">
                        <h4 class="font-semibold text-gray-900" x-text="result.title"></h4>
                        <p class="text-sm text-gray-600 mt-1" x-text="result.description"></p>
                    </div>
                    <a :href="result.url"
                       class="ml-4 text-primary-600 hover:text-primary-700">
                        <i class="fas fa-arrow-right"></i>
                    </a>
                </div>
            </div>
        </template>
    </div>

    <!-- Mensaje sin resultados -->
    <div x-show="query.length > 0 && results.length === 0 && !isSearching"
         x-transition
         class="mt-4 p-8 text-center bg-gray-50 rounded-lg border-2 border-dashed border-gray-300">
        <i class="fas fa-search text-gray-300 text-5xl mb-3"></i>
        <p class="text-gray-600 font-medium">No se encontraron resultados</p>
        <p class="text-sm text-gray-500 mt-1">Intenta con otros términos de búsqueda</p>
    </div>
</div>

<script>
function searchComponent() {
    return {
        query: '',
        filters: {
            organization: '',
            zone: '',
            dateFrom: '',
            dateTo: ''
        },
        showAdvanced: false,
        results: [],
        isSearching: false,

        async search() {
            if (this.query.length < 2 && !this.hasFilters()) {
                this.results = [];
                return;
            }

            this.isSearching = true;

            try {
                // Construir URL de búsqueda
                const params = new URLSearchParams({
                    q: this.query,
                    org: this.filters.organization,
                    zone: this.filters.zone,
                    from: this.filters.dateFrom,
                    to: this.filters.dateTo
                });

                const response = await fetch(`/api/search/?${params.toString()}`);
                const data = await response.json();

                this.results = data.results || [];
            } catch (error) {
                console.error('Error en búsqueda:', error);
                showToast({
                    icon: 'error',
                    title: 'Error al realizar la búsqueda'
                });
            } finally {
                this.isSearching = false;
            }
        },

        resetFilters() {
            this.filters = {
                organization: '',
                zone: '',
                dateFrom: '',
                dateTo: ''
            };
            this.query = '';
            this.results = [];
        },

        hasFilters() {
            return Object.values(this.filters).some(val => val !== '');
        }
    }
}
</script>
