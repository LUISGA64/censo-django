<!-- Modal de Confirmación con Alpine.js y SweetAlert2 -->

<!-- Versión 1: Modal Inline con Alpine.js -->
<div x-data="{ confirmOpen: false, confirmAction: null }">
    <!-- Trigger:
    <button @click="confirmOpen = true; confirmAction = () => { /* acción */ }">
        Eliminar
    </button>
    -->

    <div x-show="confirmOpen"
         x-transition
         @click="confirmOpen = false"
         class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50 px-4"
         style="display: none;">

        <div @click.stop
             class="bg-white rounded-xl shadow-2xl max-w-md w-full p-6">

            <!-- Icon -->
            <div class="w-16 h-16 mx-auto mb-4 bg-red-100 rounded-full flex items-center justify-center">
                <i class="fas fa-exclamation-triangle text-red-600 text-3xl"></i>
            </div>

            <!-- Title -->
            <h3 class="text-xl font-bold text-gray-900 text-center mb-2">
                ¿Estás seguro?
            </h3>

            <!-- Message -->
            <p class="text-gray-600 text-center mb-6">
                Esta acción no se puede deshacer. ¿Deseas continuar?
            </p>

            <!-- Actions -->
            <div class="flex gap-3">
                <button @click="confirmOpen = false"
                        class="flex-1 px-4 py-3 bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold rounded-lg transition-colors">
                    Cancelar
                </button>
                <button @click="confirmAction && confirmAction(); confirmOpen = false"
                        class="flex-1 px-4 py-3 bg-red-600 hover:bg-red-700 text-white font-semibold rounded-lg transition-colors">
                    Sí, eliminar
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Versión 2: Función JavaScript reutilizable con SweetAlert2 -->
<script>
/**
 * Muestra un modal de confirmación moderno
 * @param {Object} options - Opciones del modal
 * @param {string} options.title - Título del modal
 * @param {string} options.text - Texto descriptivo
 * @param {string} options.confirmText - Texto del botón confirmar
 * @param {string} options.icon - Icono: success, error, warning, info, question
 * @param {Function} options.onConfirm - Función a ejecutar al confirmar
 */
function showConfirmModal(options = {}) {
    const defaults = {
        title: '¿Estás seguro?',
        text: 'Esta acción no se puede deshacer',
        icon: 'warning',
        confirmText: 'Sí, continuar',
        cancelText: 'Cancelar',
        confirmButtonColor: '#ef4444',
        cancelButtonColor: '#6b7280',
        reverseButtons: true,
        showCancelButton: true,
        onConfirm: () => {}
    };

    const settings = { ...defaults, ...options };

    Swal.fire({
        title: settings.title,
        text: settings.text,
        icon: settings.icon,
        showCancelButton: settings.showCancelButton,
        confirmButtonColor: settings.confirmButtonColor,
        cancelButtonColor: settings.cancelButtonColor,
        confirmButtonText: settings.confirmText,
        cancelButtonText: settings.cancelText,
        reverseButtons: settings.reverseButtons,
        customClass: {
            confirmButton: 'font-semibold px-6 py-3 rounded-lg',
            cancelButton: 'font-semibold px-6 py-3 rounded-lg'
        }
    }).then((result) => {
        if (result.isConfirmed) {
            settings.onConfirm();
        }
    });
}

/**
 * Muestra una notificación toast
 * @param {Object} options - Opciones del toast
 */
function showToast(options = {}) {
    const defaults = {
        icon: 'success',
        title: 'Operación exitosa',
        position: 'top-end',
        showConfirmButton: false,
        timer: 3000,
        timerProgressBar: true,
        toast: true
    };

    const settings = { ...defaults, ...options };

    Swal.fire(settings);
}
