[tool.black]
line-length = 100
target-version = ['py311']
include = '\.pyi?$'
extend-exclude = '''
/(
    \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
  | migrations
)/
'''

[tool.isort]
profile = "black"
line_length = 100
skip_gitignore = true
skip = ["migrations", "venv", "env", ".venv"]
known_django = ["django"]
known_first_party = ["censoapp", "censoProject"]
sections = ["FUTURE", "STDLIB", "DJANGO", "THIRDPARTY", "FIRSTPARTY", "LOCALFOLDER"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "censoProject.settings"
python_files = ["tests.py", "test_*.py", "*_tests.py"]
testpaths = ["tests", "censoapp/tests"]
addopts = [
    "--verbose",
    "--strict-markers",
    "--cov=censoapp",
    "--cov-report=html",
    "--cov-report=term-missing:skip-covered",
    "--cov-fail-under=15",  # Temporal: 15%, objetivo final: 80%
    "--maxfail=5",
    "--tb=short",
]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: integration tests",
    "unit: unit tests",
    "security: security tests",
]

[tool.coverage.run]
source = ["censoapp"]
omit = [
    "*/migrations/*",
    "*/tests/*",
    "*/__pycache__/*",
    "*/venv/*",
    "*/env/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if self.debug:",
    "if settings.DEBUG",
    "raise AssertionError",
    "raise NotImplementedError",
    "if 0:",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "class .*\\bProtocol\\):",
    "@(abc\\.)?abstractmethod",
]

[tool.mypy]
python_version = "3.11"
check_untyped_defs = true
ignore_missing_imports = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_unused_configs = true
plugins = ["mypy_django_plugin.main"]

[tool.django-stubs]
django_settings_module = "censoProject.settings"

[tool.bandit]
exclude_dirs = ["tests", "migrations", "venv"]
tests = ["B201", "B301"]
skips = ["B101", "B601"]

